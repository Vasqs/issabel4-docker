services:
  issabel:
    container_name: ${ISSABEL_CONTAINER_NAME:-issabel-dev}
    hostname: ${ISSABEL_HOSTNAME:-issabel.local}
    privileged: true
    restart: unless-stopped
    cgroup: host
    stop_signal: SIGTERM
    build:
      context: .
      dockerfile: docker/issabel/Dockerfile
      args:
        ASTERISK_PACKAGE: ${ISSABEL_INSTALL_ASTERISK_PACKAGE:-asterisk18}
        OPTIONAL_PACKAGES: ${ISSABEL_INSTALL_OPTIONAL_PACKAGES:-}
    environment:
      ISABEL_BOOTSTRAP_MARKER: /var/lib/issabel/.bootstrapped
      WORKSPACE_ROOT: /workspace
      ISSABEL_INSTALL_ASTERISK_PACKAGE: ${ISSABEL_INSTALL_ASTERISK_PACKAGE:-asterisk18}
      ISSABEL_INSTALL_ISSABELBR_POST_PATCH: ${ISSABEL_INSTALL_ISSABELBR_POST_PATCH:-1}
      ISSABEL_WEB_ADMIN_USER: ${ISSABEL_WEB_ADMIN_USER:-admin}
      ISSABEL_WEB_ADMIN_PASSWORD: ${ISSABEL_WEB_ADMIN_PASSWORD:-DevAdmin123}
    command: ["/usr/sbin/init"]
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    ports:
      - "${ISSABEL_HTTP_PORT:-8088}:80"
      - "${ISSABEL_HTTPS_PORT:-8443}:443"
    volumes:
      - type: bind
        source: ${WORKSPACE_BIND_SOURCE:-.}
        target: /workspace
      - type: bind
        source: /sys/fs/cgroup
        target: /sys/fs/cgroup
        read_only: true
      - issabel-etc:/etc/asterisk
      - issabel-var-lib:/var/lib/asterisk
      - issabel-var-log:/var/log/asterisk
      - issabel-mysql:/var/lib/mysql
      - issabel-spool:/var/spool/asterisk
    healthcheck:
      test:
        - CMD-SHELL
        - "curl -fsS http://127.0.0.1/ >/dev/null && mysqladmin --socket=/var/lib/mysql/mysql.sock ping >/dev/null 2>&1 && asterisk -rx 'core show version' >/dev/null 2>&1"
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  issabel-etc:
  issabel-var-lib:
  issabel-var-log:
  issabel-mysql:
  issabel-spool:
